<figure class="highlight apache"><table><tr><td class="code"><pre><span class="line"><span class="section">&lt;div  #myDiv&gt;</span><span class="section">&lt;/div&gt;</span></span><br></pre></td></tr></table></figure>
<p>在Component.ts中需要引入<br><figure class="highlight coffeescript"><table><tr><td class="code"><pre><span class="line"><span class="keyword">import</span> &#123; ElmentRef, ViewChild &#125; <span class="keyword">from</span> <span class="string">"@angular/core"</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">export</span> <span class="class"><span class="keyword">class</span> <span class="title">TheComponent</span> &#123;</span></span><br><span class="line">    @ViewChild(<span class="string">'myDiv'</span>) element: ElementRef;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure></p>
<p>实际使用时<br><figure class="highlight css"><table><tr><td class="code"><pre><span class="line"><span class="selector-tag">console</span><span class="selector-class">.log</span>(<span class="selector-tag">this</span><span class="selector-class">.element</span><span class="selector-class">.nativeElement</span>)</span><br></pre></td></tr></table></figure></p>
